<div id="nav-rail" class="h-full flex flex-col bg-white border-r border-gray-200 flex-shrink-0">

  <!-- Header: compact BIP mark stays put; "Visualized" suffix fades in on expand -->
  <div class="relative h-14 border-b border-gray-200 flex-shrink-0">
    <img
      class="nav-logo-mark"
      src="images/Compact.svg"
      alt="BIP Visualized"
    />
    <img
      class="nav-logo-suffix"
      src="images/Suffix.png"
      alt=""
      aria-hidden="true"
    />
  </div>

  <!-- Nav items — pb-[57px] reserves space for the settings panel -->
  <nav class="flex-1 py-3 overflow-y-auto overflow-x-hidden pb-[57px]" aria-label="Main navigation">
    <div id="nav-rail-items" class="flex flex-col gap-2"></div>
  </nav>

  <!-- Settings panel: anchored to the bottom, expands upward -->
  <div id="settings-wrapper" class="settings-wrapper absolute bottom-0 left-0 right-0 bg-white border-t border-r border-gray-200 overflow-hidden z-10">

    <!-- Settings button — always at the top of the panel; slides up as panel grows -->
    <div class="p-2">
      <button
        id="settings-btn"
        class="nav-rail-item flex items-center p-2.5 rounded-lg text-sm font-medium text-[#8A857D] hover:bg-[#F1EDE5] hover:text-[#343434] transition-colors"
        data-action="settings"
      >
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17.9815 18.7248C16.6121 16.9175 14.4424 15.75 12 15.75C9.55761 15.75 7.38789 16.9175 6.01846 18.7248M17.9815 18.7248C19.8335 17.0763 21 14.6744 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 14.6744 4.1665 17.0763 6.01846 18.7248M17.9815 18.7248C16.3915 20.1401 14.2962 21 12 21C9.70383 21 7.60851 20.1401 6.01846 18.7248M15 9.75C15 11.4069 13.6569 12.75 12 12.75C10.3431 12.75 9 11.4069 9 9.75C9 8.09315 10.3431 6.75 12 6.75C13.6569 6.75 15 8.09315 15 9.75Z"/>
        </svg>
        <span class="nav-label whitespace-nowrap">Settings</span>
      </button>
    </div>

    <!-- Menu items — revealed below Settings as panel expands upward -->
    <div id="settings-menu" class="px-2 pb-2">
      <button class="w-full text-left px-3 py-2 text-sm text-[#343434] hover:bg-[#F1EDE5] rounded-lg transition-colors">Profile</button>
      <button class="w-full text-left px-3 py-2 text-sm text-[#343434] hover:bg-[#F1EDE5] rounded-lg transition-colors">Password</button>
      <button class="w-full text-left px-3 py-2 text-sm text-[#343434] hover:bg-[#F1EDE5] rounded-lg transition-colors">Billing</button>
      <button class="w-full text-left px-3 py-2 text-sm text-[#343434] hover:bg-[#F1EDE5] rounded-lg transition-colors">Team</button>
      <button class="w-full text-left px-3 py-2 text-sm text-[#343434] hover:bg-[#F1EDE5] rounded-lg transition-colors">Help</button>
      <div class="h-px bg-gray-200 mx-1 my-1"></div>
      <button class="w-full text-left px-3 py-2 text-sm text-[#343434] hover:bg-[#F1EDE5] rounded-lg transition-colors">Sign Out</button>
    </div>

  </div>

</div>
