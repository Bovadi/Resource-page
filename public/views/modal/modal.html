<div id="modal-container" class="fixed inset-0 z-[1001] flex items-center justify-center p-4">
  <div data-action="close-modal" aria-hidden="true" class="absolute inset-0 z-[100] bg-black/50 backdrop-blur-sm"></div>

  <div
    id="modal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
    class="modal-panel relative bg-white rounded-lg shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden"
  >
    <div class="flex items-center justify-between p-6 border-b border-gray-200">
      <h2 id="modal-title" class="text-xl font-semibold text-gray-900"></h2>
      <button data-action="close-modal" aria-label="Close dialog" class="p-2 hover:bg-gray-100 rounded-full transition-colors duration-200">
        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="overflow-y-auto max-h-[calc(90vh-180px)]">
      <div class="p-4 sm:p-6">
        <div class="mb-4 sm:mb-6">
          <div class="w-full h-64 rounded-lg flex items-center justify-center bg-gray-100">
            <img id="modal-image" src="" alt="" class="max-w-full max-h-full object-contain rounded-lg" />
          </div>
        </div>

        <h3 id="modal-card-title" class="text-2xl font-bold text-gray-900 mb-4"></h3>

        <div class="space-y-4 text-gray-700 mb-4">
          <p id="modal-description" class="leading-relaxed"></p>

          <div class="bg-gray-50 p-3 sm:p-4 rounded-lg">
            <h4 class="font-semibold text-gray-900 mb-3">Perfect for:</h4>
            <ul id="modal-perfect-for" class="space-y-2 text-sm">
            </ul>
          </div>
        </div>
      </div>
    </div>

    <div class="border-t border-gray-200 p-4 sm:p-6 flex-shrink-0">
      <button data-action="start-action" class="w-full bg-primary-500 text-white py-3 px-4 rounded-lg hover:bg-primary-600 transition-colors duration-200 font-medium min-h-[48px]">
        <span id="modal-action-text"></span>
      </button>
    </div>
  </div>
</div>
