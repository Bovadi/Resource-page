<!-- Search: flex-1 stretches it to fill all space between the toolbar's
     left edge (aligned with the card grid) and the next sibling on its
     right (Upgrade button, or Sort dropdown if Upgrade is removed). The
     toolbar's gap-2 enforces the 8px gap on the right. Hidden on mobile,
     where the toolbar is a floating chip in the top-right and a wide
     search would be cramped. -->
<div class="relative flex-1 hidden lg:block">
  <!-- Heroicons: magnifying-glass -->
  <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
  </svg>
  <input
    id="search-input"
    type="search"
    aria-label="Search resources"
    placeholder="Search resources, strategies, or ask anything about BIP Visualized"
    class="w-full bg-white/80 backdrop-blur-sm rounded-full pl-10 pr-4 py-2 shadow-sm border border-gray-200/60 text-sm text-text-primary placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary-500/40 hover:shadow-md transition-all duration-200"
  />
</div>

<button
  id="upgrade-btn"
  type="button"
  class="flex items-center gap-1.5 bg-primary-500 hover:bg-primary-600 text-white rounded-full pl-3 sm:pl-4 pr-3 sm:pr-4 py-2 shadow-sm transition-all duration-200"
>
  <!-- Heroicons: sparkles -->
  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z" />
  </svg>
  <span class="text-sm font-medium whitespace-nowrap">Upgrade</span>
</button>

<div class="relative">
  <button
    id="sort-menu-btn"
    type="button"
    aria-haspopup="menu"
    aria-expanded="false"
    aria-controls="sort-menu-panel"
    class="flex items-center gap-2 bg-white/80 backdrop-blur-sm rounded-full pl-3 sm:pl-4 pr-2.5 sm:pr-3 py-2 shadow-sm border border-gray-200/60 hover:shadow-md transition-all duration-200"
  >
    <!-- Heroicons: arrows-up-down -->
    <svg class="w-4 h-4 text-text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5 7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5" />
    </svg>
    <span class="text-sm font-medium text-text-primary whitespace-nowrap">
      <span class="hidden sm:inline">Sort: </span><span id="sort-menu-label">Newest</span>
    </span>
    <!-- Heroicons: chevron-down -->
    <svg id="sort-menu-caret" class="w-4 h-4 text-gray-400 transition-transform duration-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </svg>
  </button>

  <div
    id="sort-menu-panel"
    role="menu"
    aria-label="Sort options"
    class="absolute right-0 top-full mt-2 w-44 bg-white rounded-xl shadow-lg border border-gray-200/60 p-1.5 hidden opacity-0 transform scale-95 transition-all duration-200 z-40"
  >
    <div id="sort-menu-list" class="flex flex-col"></div>
  </div>
</div>
