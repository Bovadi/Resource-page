<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Resources Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      @import url("https://fonts.googleapis.com/css?family=Inter:400,600");
    </style>
    <link href="tailwind.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
    <link href="src/styles/responsive-grid.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div class="fixed inset-0 w-full h-screen bg-white border border-solid border-black overflow-hidden flex flex-col">
        <div id="header-container" class="flex-shrink-0"></div>

        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden hidden"></div>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
          <div id="sidebar-container"></div>

          <div class="flex-1 flex flex-col w-full lg:ml-0 overflow-hidden">
            <div id="main-container" class="flex-1 flex flex-col overflow-hidden"></div>
          </div>
        </div>

        <div id="modal-container"></div>
      </div>
    </div>
    <script src="./src/lib/checkbox.js"></script>
    <script type="module" src="./script.js"></script>
  </body>
</html>
