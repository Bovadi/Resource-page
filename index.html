<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Resources Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
    </style>
    <link href="tailwind.css" rel="stylesheet" />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div class="fixed inset-0 w-full h-screen bg-white overflow-hidden flex flex-col">

        <!-- Mobile header (hidden on desktop) -->
        <div id="header-container" class="flex-shrink-0 lg:hidden"></div>

        <!-- Sidebar overlay for mobile -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden hidden"></div>

        <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">

          <!-- Nav Rail (desktop only) -->
          <div id="nav-rail-container" class="relative z-20 hidden lg:flex flex-shrink-0 h-full"></div>

          <!-- Sidebar content panel -->
          <div id="sidebar-container" class="flex-shrink-0 lg:h-full"></div>

          <!-- Main content -->
          <div class="flex-1 flex flex-col overflow-hidden relative">
            <!--
              Toolbar hosts the sort menu.
              Mobile: absolutely positioned so it floats in the top-right of the beige area
              and the beige can still fill the full vertical space below the header.
              Desktop (lg+): in-flow 72px strip above the beige (reverts via lg:static).
            -->
            <div id="toolbar-container"
                 class="absolute top-3 right-4 z-10 flex items-center justify-end gap-2
                        lg:static lg:top-auto lg:right-auto lg:z-auto
                        lg:flex-shrink-0 lg:h-[72px] lg:px-6"></div>
            <div id="main-container" class="flex-1 flex flex-col overflow-hidden"></div>
          </div>

        </div>

        <!-- Modal -->
        <div id="modal-container"></div>

      </div>
    </div>
    <script type="module" src="./script.js"></script>
  </body>
</html>
